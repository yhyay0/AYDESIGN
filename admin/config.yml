backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "profile"
    label: "Profile & Contact"
    files:
      - file: "data/cms/profile.json"
        label: "Profile Information"
        name: "profile_info"
        description: "Edit hero text, bio, terms, skills, and contact details."
        fields:
          - { label: "Role", name: "role", widget: "string", hint: "Main hero title on homepage." }
          - { label: "Subtitle", name: "subtitle", widget: "text", hint: "Short sentence below hero title." }
          - { label: "Bio", name: "bio", widget: "text", hint: "About section text." }
          - { label: "Terms of Use", name: "termsOfUse", widget: "text", hint: "Shown in the Terms modal." }
          - label: "Skills"
            name: "skills"
            widget: "list"
            summary: "{{fields.skill}}"
            field: { label: "Skill", name: "skill", widget: "string" }
          - label: "Contact"
            name: "contact"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Email", name: "email", widget: "string" }
              - { label: "LinkedIn", name: "linkedin", widget: "string" }
              - { label: "Instagram", name: "instagram", widget: "string" }
              - { label: "Behance", name: "behance", widget: "string" }

  - name: "projects"
    label: "Projects"
    files:
      - file: "data/cms/projects.json"
        label: "Projects List"
        name: "projects_list"
        description: "Add/edit projects. For each media field, upload local file or use external URL."
        fields:
          - label: "Projects"
            name: "items"
            widget: "list"
            summary: "{{fields.title}} - {{fields.category}} ({{fields.year}})"
            fields:
              - { label: "ID", name: "id", widget: "number", value_type: "int" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Category", name: "category", widget: "string" }
              - label: "Cover Image"
                name: "image"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Upload Local File", name: "upload", widget: "image", required: false }
                  - { label: "Or External Image URL", name: "url", widget: "string", required: false, hint: "Paste full https:// image URL." }
              - { label: "Description", name: "description", widget: "text" }
              - label: "Tools"
                name: "tools"
                widget: "list"
                summary: "{{fields.tool}}"
                field: { label: "Tool", name: "tool", widget: "string" }
              - label: "Additional Info"
                name: "additionalInfo"
                widget: "list"
                summary: "{{fields.info}}"
                field: { label: "Info", name: "info", widget: "string" }
              - label: "Gallery"
                name: "gallery"
                widget: "list"
                summary: "{{fields.kind}} - {{fields.url}}"
                fields:
                  - label: "Media Type"
                    name: "kind"
                    widget: "select"
                    default: "image"
                    options:
                      - { label: "Image", value: "image" }
                      - { label: "Video", value: "video" }
                  - { label: "Upload Local File (Image or Video)", name: "upload", widget: "file", required: false, hint: "You can add multiple media entries per project." }
                  - { label: "Or External Media URL", name: "url", widget: "string", required: false, hint: "Paste full https:// URL for image or video." }
              - { label: "Year", name: "year", widget: "number", value_type: "int" }
